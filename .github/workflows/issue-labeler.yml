name: Issue Auto-Labeler

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-assign labels from issue form
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const labels = [];

            // area -> label mapping
            const areaLabels = {
              'Gameplay / Driving': 'gameplay',
              'Gear System': 'gear-system',
              'Leaderboard': 'leaderboard',
              'Graphics / Visuals': 'graphics',
              'Audio': 'audio',
              'Menus / UI': 'ui',
              'Controls / Input': 'controls',
            };

            const areaMatch = body.match(/### Area\s*\n\s*(.+)/);
            if (areaMatch) {
              const area = areaMatch[1].trim();
              if (areaLabels[area]) {
                labels.push(areaLabels[area]);
              }
            }

            // os -> platform label mapping
            const osLabels = {
              'Windows': 'platform:windows',
              'macOS': 'platform:macos',
              'Linux': 'platform:linux',
            };

            const osMatch = body.match(/### Operating System\s*\n\s*(.+)/);
            if (osMatch) {
              const os = osMatch[1].trim();
              if (osLabels[os]) {
                labels.push(osLabels[os]);
              }
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels,
              });
            }
