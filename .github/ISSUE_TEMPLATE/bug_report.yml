name: Bug Report
description: Report a bug or unexpected behavior in Jelly Drift Second Gear
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: input-method
    attributes:
      label: Input Method
      description: What input device were you using?
      options:
        - Keyboard
        - PXN Steering Wheel
        - Other Controller
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: What part of the game is affected?
      options:
        - Gameplay / Driving
        - Gear System
        - Leaderboard
        - Graphics / Visuals
        - Audio
        - Menus / UI
        - Controls / Input 
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Videos
      description: If applicable, add screenshots or video links to help explain the problem.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might be helpful.
